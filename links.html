    .links-page {

    .links-card__logo {

      margin-bottom: 0.5rem;
    }
    .links-card__tagline {

      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 2.25rem;
    }
    .links-card__deco {

      letter-spacing: 0.5em;
      font-size: 0.9rem;

    .link-btn {

      width: 100%;
      padding: 1.05rem 1.5rem;
      margin-bottom: 1rem;
      font-family: var(--ff-serif);
      font-size: 0.92rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--cream);
      background: rgba(255, 241, 212, 0.06);
      border: 1px solid rgba(255, 241, 212, 0.28);
      border-radius: 4px;
      transition: transform 0.25s var(--ease), background 0.25s var(--ease), color 0.25s var(--ease), border-color 0.25s var(--ease);
    }
    .link-btn:hover {
      background: var(--cream);
      color: var(--ash);
      border-color: var(--cream);
      transform: translateY(-3px);
    }
    .link-btn--featured {
      background: var(--oxblood);
      border-color: var(--oxblood);
      color: var(--cream);
    }
    .link-btn--featured:hover {
      background: var(--deep-wine);
      border-color: var(--deep-wine);
      color: var(--cream);
    }
    .link-btn__sub {
      display: block;
      font-family: var(--ff-body);
      font-size: 0.78rem;
      letter-spacing: 0;
      text-transform: none;
      opacity: 0.75;
      margin-top: 0.2rem;
    }
    .links-card__socials {
      display: flex;
      justify-content: center;
      gap: 1.4rem;
      margin-top: 2rem;
    }
    .links-card__socials img {
      width: 24px;
      height: 24px;
      opacity: 0.8;
      transition: opacity 0.25s var(--ease), transform 0.25s var(--ease);
    }
    .links-card__socials a:hover img {
      opacity: 1;
      transform: translateY(-3px);
